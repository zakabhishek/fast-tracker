<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fast.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Instrument+Serif:ital@0;1&display=swap');

        :root {
            --bg: #F9F8F4;
            --surface: #FFFFFF;
            --border: #EEEEEE;
            --accent: #1A1A1A;
            --text-main: #1A1A1A;
            --text-muted: #8E8E93;
            --blue: #007AFF;
            --success: #34C759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header & Tabs --- */
        nav {
            padding: 20px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 24px; }

        .tab-group {
            display: flex;
            background: #EBEBEB;
            padding: 4px;
            border-radius: 12px;
        }

        .tab {
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            background: transparent;
            transition: 0.2s;
        }

        .tab.active {
            background: var(--surface);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* --- Main Layout --- */
        .page { flex: 1; overflow-y: auto; padding: 10px 20px 40px; display: none; }
        .page.active { display: block; }

        /* --- Refined Timer Card --- */
        .clock-card {
            background: var(--surface);
            border-radius: 32px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.02);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .t-stage-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .t-time {
            font-family: 'Instrument Serif', serif;
            font-size: 56px;
            line-height: 1;
            margin: 10px 0;
        }

        /* --- Body Info Grid --- */
        .body-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .body-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 10px;
            text-align: center;
            transition: transform 0.2s;
        }

        .body-card-icon { font-size: 24px; margin-bottom: 8px; }
        .body-card-text { font-size: 10px; font-weight: 500; color: var(--text-muted); line-height: 1.4; }

        /* --- Controls --- */
        .controls {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .control-label { font-size: 13px; font-weight: 600; color: var(--text-muted); }

        .goal-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
        .chip {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .chip.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* --- Action Button --- */
        .btn-primary {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary.stop { background: #FF3B30; }
        
        /* SVG Animation Styles */
        .stage-segment { transition: opacity 0.5s ease, stroke-width 0.3s ease; }

    </style>
</head>
<body>

<nav>
    <div class="logo">fast.</div>
    <div class="tab-group">
        <button class="tab active" onclick="showPage('timer', this)">Timer</button>
        <button class="tab" onclick="showPage('log', this)">Log</button>
        <button class="tab" onclick="showPage('stages', this)">Stages</button>
    </div>
</nav>

<div id="page-timer" class="page active">
    <div class="clock-card">
        <div class="t-stage-label" id="t-stage-current">Ready</div>
        
        <div style="position: relative; width: 240px; margin: 20px auto;">
            <svg id="clock-svg" viewBox="0 0 300 300"></svg>
            <div style="position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <div class="t-time" id="t-time">00:00:00</div>
                <div style="font-size: 12px; font-weight: 600; color: var(--blue);" id="t-status">TAP START</div>
            </div>
        </div>

        <div id="t-next" style="font-size: 11px; color: var(--text-muted); margin-top: 10px;"></div>
    </div>

    <div class="body-cards" id="body-cards">
        </div>

    <div class="controls">
        <div class="control-row">
            <span class="control-label">Goal Duration</span>
            <div class="goal-chips">
                <div class="chip active" data-h="16" onclick="setGoal(this)">16h</div>
                <div class="chip" data-h="18" onclick="setGoal(this)">18h</div>
                <div class="chip" data-h="24" onclick="setGoal(this)">24h</div>
            </div>
        </div>
    </div>

    <button class="btn-primary" id="btn-main" onclick="toggleFast()">Start Fast</button>
</div>

<script>
    // Note: Use your existing STAGES array and logic here. 
    // The main change is in the renderClock function to handle the "Highlighting only current stage"
    
    function renderClock(elapsedMs) {
        const svg = document.getElementById('clock-svg');
        const elapsedH = elapsedMs / 3600000;
        const curIdx = S.isFasting ? stageOf(elapsedMs) : -1;
        
        const CX = 150, CY = 150, R = 120, SW = 12;
        let html = '';

        STAGES.forEach((st, i) => {
            const startDeg = (st.range[0] / 48) * 360;
            const endH = st.range[1] === Infinity ? 48 : st.range[1];
            const endDeg = (endH / 48) * 360;
            
            // LOGIC: Highlight only if it is the current stage
            const isActive = (i === curIdx);
            const opacity = isActive ? 1 : 0.1;
            const strokeW = isActive ? SW + 4 : SW;

            html += `<path d="${arcPath(R, startDeg, endDeg)}" 
                        fill="none" 
                        stroke="${st.color}" 
                        stroke-width="${strokeW}" 
                        stroke-linecap="round"
                        style="opacity: ${opacity}; transition: all 0.5s;" />`;
        });

        svg.innerHTML = html;
    }

    // Include your arcPath, toggleFast, and state management logic from previous version
</script>
</body>
</html>
