<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fast">
<title>Fast</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Syne+Mono&display=swap');

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e8e6e0;
  --border2: #d4d1c8;
  --accent: #1a1a1a;
  --blue: #0066ff;
  --text: #1a1a1a;
  --text2: #6b6860;
  --text3: #a09e98;
  --success: #00a86b;
  --danger: #e63946;
  --muted: #eeecea;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height:100%; background:var(--bg); color:var(--text);
  font-family:'Syne',sans-serif; overflow:hidden; position:fixed; width:100%;
  -webkit-font-smoothing:antialiased;
}

.app {
  height:100dvh; display:flex; flex-direction:column;
  padding-top:env(safe-area-inset-top,44px);
  padding-bottom:env(safe-area-inset-bottom,20px);
}

nav {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 20px;
}

.logo { font-size:20px; font-weight:700; letter-spacing:-0.5px; }

.tab-group {
  display:flex; background:var(--muted); padding:3px; border-radius:10px;
}

.tab {
  padding:6px 16px; border-radius:7px; font-family:'Syne',sans-serif;
  font-size:12px; font-weight:600; cursor:pointer; border:none;
  background:transparent; color:var(--text3); transition:all .18s;
}

.tab.active { background:var(--surface); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,.08); }

.page { display:none; flex:1; overflow-y:auto; padding:0 18px 28px; }
.page.active { display:block; }
::-webkit-scrollbar { display:none; }

/* Timer page */
.timer-wrap { display:flex; flex-direction:column; gap:10px; }

.timer-card {
  background:var(--surface); border-radius:16px; padding:20px 20px 16px;
  border:1px solid var(--border);
}

.t-status {
  font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--text3); margin-bottom:4px;
}
.t-status.active { color:var(--blue); }
.t-status.done { color:var(--success); }

.t-time {
  font-family:'Syne Mono',monospace; font-size:52px; font-weight:400;
  letter-spacing:-2px; color:var(--text); line-height:1;
}

.prog-wrap { height:3px; background:var(--muted); border-radius:2px; margin-top:16px; overflow:hidden; }

.prog-fill {
  height:100%; background:var(--blue); border-radius:2px;
  transition:width 1s linear; width:0%;
}
.prog-fill.done { background:var(--success); }

.prog-labels { display:flex; justify-content:space-between; margin-top:5px; }
.prog-labels span { font-size:10px; font-family:'Syne Mono',monospace; color:var(--text3); }
.prog-labels .rem { color:var(--blue); }

/* Start time row */
.row-card {
  background:var(--surface); border-radius:16px; border:1px solid var(--border);
}

.row-inner {
  display:flex; justify-content:space-between; align-items:center;
  padding:13px 16px; cursor:pointer; user-select:none;
}

.row-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); }
.row-value { font-family:'Syne Mono',monospace; font-size:12px; color:var(--text); }
.row-arrow { font-size:10px; color:var(--text3); }

/* Goal */
.goal-card { background:var(--surface); border-radius:16px; border:1px solid var(--border); padding:13px 16px; }
.goal-lbl { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:10px; }
.goal-chips { display:flex; gap:6px; flex-wrap:wrap; }

.chip {
  padding:7px 14px; border-radius:8px; border:1px solid var(--border2);
  background:var(--muted); font-family:'Syne',sans-serif; font-size:12px;
  font-weight:700; color:var(--text2); cursor:pointer; transition:all .15s;
}
.chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* Stage timeline */
.tl-card { background:var(--surface); border-radius:16px; border:1px solid var(--border); padding:13px 16px; }
.tl-lbl { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text3); margin-bottom:14px; }
.tl { display:flex; flex-direction:column; }

.sr { display:flex; gap:12px; align-items:flex-start; position:relative; }

.sr-line-wrap { width:20px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; }

.sr-dot {
  width:20px; height:20px; border-radius:50%; background:var(--muted);
  border:2px solid var(--border2); display:flex; align-items:center;
  justify-content:center; font-size:9px; transition:all .3s; flex-shrink:0;
  position:relative; z-index:1;
}

.sr-vline {
  width:1px; flex:1; background:var(--border2); min-height:14px;
}

.sr.past .sr-dot { background:var(--accent); border-color:var(--accent); color:#fff; }
.sr.past .sr-vline { background:var(--accent); }

.sr.current .sr-dot {
  background:var(--blue); border-color:var(--blue); color:#fff;
  box-shadow:0 0 0 4px rgba(0,102,255,.12);
  animation:dpulse 2s ease-in-out infinite;
}

@keyframes dpulse {
  0%,100% { box-shadow:0 0 0 4px rgba(0,102,255,.12); }
  50% { box-shadow:0 0 0 8px rgba(0,102,255,.05); }
}

.sr.future .sr-dot { background:var(--muted); border-color:var(--border); }

.sr-body { flex:1; padding-bottom:12px; }

.sr-name { font-size:13px; font-weight:600; color:var(--text2); padding-top:1px; }
.sr.current .sr-name { color:var(--blue); }
.sr.past .sr-name { color:var(--text); }

.sr-range { font-family:'Syne Mono',monospace; font-size:10px; color:var(--text3); margin-top:1px; }

.sr-desc { font-size:11px; color:var(--text2); margin-top:3px; line-height:1.5; display:none; }
.sr.current .sr-desc { display:block; }

/* Buttons */
.btn {
  width:100%; padding:17px; border-radius:14px; border:none;
  background:var(--accent); color:#fff; font-family:'Syne',sans-serif;
  font-size:15px; font-weight:700; cursor:pointer; transition:all .15s;
}
.btn:active { opacity:.85; transform:scale(.98); }
.btn.stop { background:var(--danger); }

/* History */
.sec-hdr { display:flex; justify-content:space-between; align-items:baseline; padding:18px 0 12px; }
.sec-title { font-size:22px; font-weight:700; letter-spacing:-.5px; }
.sec-sub { font-size:11px; font-weight:600; color:var(--text3); }
.h-list { display:flex; flex-direction:column; gap:8px; }

.hi {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:13px 15px; display:grid; grid-template-columns:1fr auto; gap:2px 10px;
}
.hi-date { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text3); grid-column:1; }
.hi-dur { font-size:28px; font-weight:700; letter-spacing:-1px; line-height:1.1; grid-column:1; }
.hi-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; grid-column:1; }
.hi-tag {
  font-size:9px; font-weight:600; padding:3px 7px; border-radius:6px;
  background:var(--muted); color:var(--text2);
}
.hi-side { grid-column:2; grid-row:1/5; display:flex; flex-direction:column; align-items:flex-end; justify-content:space-between; }
.hi-goal { font-size:10px; font-weight:700; padding:4px 8px; border-radius:6px; background:var(--muted); color:var(--text2); }
.hi-ok { font-size:10px; font-weight:700; color:var(--success); }
.hi-par { font-size:10px; font-weight:600; color:var(--text3); }
.hi-del { background:none; border:none; color:var(--border2); font-size:14px; cursor:pointer; }

.empty { text-align:center; padding:60px 20px; color:var(--text3); font-size:13px; font-weight:500; line-height:2; }
.empty-icon { font-size:36px; margin-bottom:10px; }

/* Info */
.info-list { display:flex; flex-direction:column; gap:8px; }
.ic {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; display:flex; gap:13px; align-items:flex-start;
}
.ic-icon { font-size:22px; flex-shrink:0; margin-top:2px; }
.ic-name { font-size:14px; font-weight:700; }
.ic-range { font-family:'Syne Mono',monospace; font-size:10px; color:var(--blue); margin:2px 0 5px; }
.ic-desc { font-size:12px; color:var(--text2); line-height:1.55; }

/* Modal */
.overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:100;
  align-items:flex-end; padding-bottom:env(safe-area-inset-bottom,20px);
}
.overlay.open { display:flex; }

.modal {
  background:var(--surface); border-radius:20px 20px 0 0;
  padding:22px 20px 28px; width:100%;
  animation:up .22s ease;
}
@keyframes up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-title { font-size:18px; font-weight:700; margin-bottom:6px; }
.modal-note { font-size:12px; color:var(--text3); margin-bottom:16px; line-height:1.5; }

.modal input[type=datetime-local] {
  width:100%; padding:13px 14px; border-radius:12px;
  border:1px solid var(--border2); background:var(--muted);
  font-family:'Syne Mono',monospace; font-size:15px; color:var(--text);
  outline:none; -webkit-appearance:none; margin-bottom:10px;
}

.modal-now {
  width:100%; padding:12px; border-radius:10px; border:1px solid var(--border2);
  background:transparent; font-family:'Syne',sans-serif; font-size:13px;
  font-weight:700; color:var(--blue); cursor:pointer; margin-bottom:10px;
}

.modal-ok {
  width:100%; padding:15px; border-radius:12px; border:none;
  background:var(--accent); color:#fff; font-family:'Syne',sans-serif;
  font-size:14px; font-weight:700; cursor:pointer; margin-bottom:8px;
}

.modal-cancel {
  width:100%; padding:11px; border-radius:10px; border:none;
  background:transparent; font-family:'Syne',sans-serif;
  font-size:13px; font-weight:600; color:var(--text3); cursor:pointer;
}
</style>
</head>
<body>
<div class="app">
  <nav>
    <div class="logo">fast.</div>
    <div class="tab-group">
      <button class="tab active" onclick="showPage('timer',this)">Timer</button>
      <button class="tab" onclick="showPage('history',this)">Log</button>
      <button class="tab" onclick="showPage('info',this)">Stages</button>
    </div>
  </nav>

  <!-- TIMER -->
  <div class="page active" id="page-timer">
    <div class="timer-wrap">

      <div class="timer-card">
        <div class="t-status" id="t-status">READY</div>
        <div class="t-time" id="t-time">00:00:00</div>
        <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
        <div class="prog-labels">
          <span id="prog-pct">0%</span>
          <span class="rem" id="prog-rem"></span>
        </div>
      </div>

      <div class="row-card" id="stc-card">
        <div class="row-inner" onclick="openModal()">
          <span class="row-label">Started</span>
          <span class="row-value" id="stc-val">Now</span>
          <span class="row-arrow">▾</span>
        </div>
      </div>

      <div class="goal-card">
        <div class="goal-lbl">Goal</div>
        <div class="goal-chips" id="goal-chips">
          <div class="chip active" data-h="16" onclick="setGoal(this)">16h</div>
          <div class="chip" data-h="18" onclick="setGoal(this)">18h</div>
          <div class="chip" data-h="20" onclick="setGoal(this)">20h</div>
          <div class="chip" data-h="24" onclick="setGoal(this)">24h</div>
          <div class="chip" data-h="36" onclick="setGoal(this)">36h</div>
          <div class="chip" data-h="48" onclick="setGoal(this)">48h</div>
        </div>
      </div>

      <div class="tl-card">
        <div class="tl-lbl">Metabolic Stages</div>
        <div class="tl" id="tl"></div>
      </div>

      <button class="btn" id="btn-main" onclick="toggleFast()">Start Fast</button>

    </div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div class="sec-hdr">
      <div class="sec-title">Log</div>
      <div class="sec-sub" id="h-count"></div>
    </div>
    <div class="h-list" id="h-list"></div>
  </div>

  <!-- INFO -->
  <div class="page" id="page-info">
    <div class="sec-hdr"><div class="sec-title">Stages</div></div>
    <div class="info-list" id="info-list"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="modal">
    <div class="modal-title">When did you start?</div>
    <div class="modal-note">Set a past or future start time. The timer and stage tracker will adjust automatically.</div>
    <input type="datetime-local" id="dt-in">
    <button class="modal-now" onclick="useNow()">Use current time</button>
    <button class="modal-ok" onclick="confirmTime()">Confirm</button>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const STAGES=[
  {name:'Fed State',icon:'🍽️',range:[0,4],desc:'Digestion active. Blood glucose and insulin are elevated.'},
  {name:'Post-Absorptive',icon:'⚡',range:[4,8],desc:'Digestion complete. Glycogen stores begin supplying energy.'},
  {name:'Gluconeogenesis',icon:'🔄',range:[8,16],desc:'Liver produces glucose from non-carb sources. Fat burning begins.'},
  {name:'Early Ketosis',icon:'🔥',range:[16,24],desc:'Glycogen depleted. Ketones rise. Mental clarity often improves.'},
  {name:'Deep Ketosis',icon:'✨',range:[24,36],desc:'High ketone production. Growth hormone surges. Autophagy begins.'},
  {name:'Peak Autophagy',icon:'🧬',range:[36,48],desc:'Autophagy at peak. Immune regeneration may begin.'},
  {name:'Extended Fast',icon:'🌙',range:[48,Infinity],desc:'Deep adaptation. Medical guidance recommended. Mind electrolytes.'}
];

let S={isFasting:false,startTime:null,goalHours:16,history:[],customStart:false};
let iv=null;

function save(){localStorage.setItem('fv3',JSON.stringify(S));}
function load(){
  try{
    const r=localStorage.getItem('fv3');
    if(r){const s=JSON.parse(r);S={...S,...s};if(S.startTime)S.startTime=new Date(S.startTime);}
  }catch(e){}
}

function ms(){return S.startTime?Date.now()-S.startTime.getTime():0;}

function fmt(t){
  const s=Math.floor(t/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
  return `${p(h)}:${p(m)}:${p(sc)}`;
}

function fmtS(t){
  const m=Math.floor(t/60000),h=Math.floor(m/60),mn=m%60;
  return h===0?`${mn}m`:mn===0?`${h}h`:`${h}h ${mn}m`;
}

function fmtD(d){
  return new Date(d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
}

function p(n){return String(n).padStart(2,'0');}

function stageIdx(t){
  const h=t/3600000;
  const i=STAGES.findIndex(s=>h>=s.range[0]&&h<s.range[1]);
  return i===-1?STAGES.length-1:i;
}

function toLocal(d){
  const dt=new Date(d);dt.setMinutes(dt.getMinutes()-dt.getTimezoneOffset());
  return dt.toISOString().slice(0,16);
}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el)el.classList.add('active');
  if(id==='history')renderHistory();
  if(id==='info')renderInfo();
}

function setGoal(el){
  if(S.isFasting)return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  S.goalHours=parseInt(el.dataset.h);
  save();updateUI();
}

function openModal(){
  if(S.isFasting)return;
  document.getElementById('dt-in').value=toLocal(S.startTime||new Date());
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function outsideClose(e){if(e.target===document.getElementById('overlay'))closeModal();}
function useNow(){document.getElementById('dt-in').value=toLocal(new Date());}
function confirmTime(){
  const v=document.getElementById('dt-in').value;
  if(!v){closeModal();return;}
  const d=new Date(v);
  if(isNaN(d.getTime())){closeModal();return;}
  S.startTime=d;S.customStart=true;save();
  updateStcVal();closeModal();updateUI();
}

function updateStcVal(){
  const el=document.getElementById('stc-val');
  el.textContent=(!S.customStart||!S.startTime)?'Now':fmtD(S.startTime);
}

function toggleFast(){S.isFasting?stopFast():startFast();}

function startFast(){
  if(!S.customStart||!S.startTime)S.startTime=new Date();
  S.isFasting=true;S.customStart=false;save();
  document.getElementById('btn-main').textContent='End Fast';
  document.getElementById('btn-main').classList.add('stop');
  document.getElementById('stc-card').style.pointerEvents='none';
  document.getElementById('goal-chips').style.pointerEvents='none';
  document.getElementById('goal-chips').style.opacity='.4';
  iv=setInterval(updateUI,1000);updateUI();
}

function stopFast(){
  const t=ms();
  if(t<30000){cancelFast();return;}
  const stagesReached=STAGES.filter(s=>t/3600000>s.range[0]);
  S.history.unshift({
    id:Date.now(),start:S.startTime.toISOString(),end:new Date().toISOString(),
    durationMs:t,goalHours:S.goalHours,completed:t>=S.goalHours*3600000,
    stages:stagesReached.map(s=>s.name)
  });
  S.isFasting=false;S.startTime=null;S.customStart=false;
  clearInterval(iv);save();resetUI();
}

function cancelFast(){
  S.isFasting=false;S.startTime=null;S.customStart=false;
  clearInterval(iv);save();resetUI();
}

function resetUI(){
  document.getElementById('t-time').textContent='00:00:00';
  document.getElementById('t-status').textContent='READY';
  document.getElementById('t-status').className='t-status';
  const pf=document.getElementById('prog-fill');
  pf.style.width='0%';pf.classList.remove('done');
  document.getElementById('prog-pct').textContent='0%';
  document.getElementById('prog-rem').textContent='';
  document.getElementById('btn-main').textContent='Start Fast';
  document.getElementById('btn-main').classList.remove('stop');
  document.getElementById('stc-card').style.pointerEvents='auto';
  document.getElementById('goal-chips').style.pointerEvents='auto';
  document.getElementById('goal-chips').style.opacity='1';
  document.getElementById('stc-val').textContent='Now';
  renderTL(0);
}

function updateUI(){
  const t=ms(),goalMs=S.goalHours*3600000,pct=Math.min(t/goalMs,1);
  document.getElementById('t-time').textContent=fmt(t);
  const pf=document.getElementById('prog-fill');
  pf.style.width=(pct*100).toFixed(1)+'%';
  const st=document.getElementById('t-status');
  if(!S.isFasting){
    st.textContent='READY';st.className='t-status';
    document.getElementById('prog-pct').textContent='0%';
    document.getElementById('prog-rem').textContent='';
  } else if(pct>=1){
    st.textContent='GOAL MET ✓';st.className='t-status done';pf.classList.add('done');
    document.getElementById('prog-pct').textContent='100%';
    document.getElementById('prog-rem').textContent='+'+fmtS(t-goalMs);
  } else {
    st.textContent='FASTING';st.className='t-status active';pf.classList.remove('done');
    document.getElementById('prog-pct').textContent=Math.floor(pct*100)+'%';
    document.getElementById('prog-rem').textContent=fmtS(goalMs-t)+' left';
  }
  renderTL(t);
  updateStcVal();
}

function renderTL(t){
  const cur=S.isFasting?stageIdx(t):-1;
  document.getElementById('tl').innerHTML=STAGES.map((s,i)=>{
    let cls='sr '+(i<cur?'past':i===cur?'current':'future');
    const r=s.range[1]===Infinity?`${s.range[0]}h+`:`${s.range[0]}h – ${s.range[1]}h`;
    const isLast=i===STAGES.length-1;
    return `<div class="${cls}">
      <div class="sr-line-wrap">
        <div class="sr-dot">${i<cur?'✓':''}</div>
        ${!isLast?'<div class="sr-vline"></div>':''}
      </div>
      <div class="sr-body">
        <div class="sr-name">${s.icon} ${s.name}</div>
        <div class="sr-range">${r}</div>
        <div class="sr-desc">${s.desc}</div>
      </div>
    </div>`;
  }).join('');
}

function renderHistory(){
  const list=document.getElementById('h-list'),cnt=document.getElementById('h-count');
  if(!S.history.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">🌙</div>No fasts logged yet.<br>Complete a fast to see it here.</div>';
    cnt.textContent='';return;
  }
  cnt.textContent=S.history.length+' fast'+(S.history.length!==1?'s':'');
  list.innerHTML=S.history.map(f=>`
    <div class="hi">
      <div class="hi-date">${fmtD(f.start)}</div>
      <div class="hi-dur">${fmtS(f.durationMs)}</div>
      <div class="hi-tags">${f.stages.slice(0,5).map(s=>`<span class="hi-tag">${s}</span>`).join('')}</div>
      <div class="hi-side">
        <div class="hi-goal">${f.goalHours}h</div>
        ${f.completed?'<div class="hi-ok">✓ Done</div>':'<div class="hi-par">Partial</div>'}
        <button class="hi-del" onclick="delLog(${f.id})">✕</button>
      </div>
    </div>`).join('');
}

function delLog(id){S.history=S.history.filter(f=>f.id!==id);save();renderHistory();}

function renderInfo(){
  document.getElementById('info-list').innerHTML=STAGES.map(s=>`
    <div class="ic">
      <div class="ic-icon">${s.icon}</div>
      <div>
        <div class="ic-name">${s.name}</div>
        <div class="ic-range">${s.range[1]===Infinity?s.range[0]+'h+':s.range[0]+'h – '+s.range[1]+'h'}</div>
        <div class="ic-desc">${s.desc}</div>
      </div>
    </div>`).join('');
}

// Init
load();
document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',parseInt(c.dataset.h)===S.goalHours));
renderTL(0);

if(S.isFasting){
  document.getElementById('btn-main').textContent='End Fast';
  document.getElementById('btn-main').classList.add('stop');
  document.getElementById('stc-card').style.pointerEvents='none';
  document.getElementById('goal-chips').style.pointerEvents='none';
  document.getElementById('goal-chips').style.opacity='.4';
  iv=setInterval(updateUI,1000);updateUI();
} else {updateStcVal();}
</script>
</body>
</html>
